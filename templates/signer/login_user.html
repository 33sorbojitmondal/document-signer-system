{% extends 'signer/base.html' %}

{% block title %}User Login - Document Signer System{% endblock %}

{% block auth_content %}
<div class="auth-card">
    <div class="auth-header">
        <i class="bi bi-person-fill auth-icon"></i>
        <h2>User Login</h2>
        <p class="text-muted">Upload documents for authority verification</p>
    </div>
    <form method="post" class="auth-form">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label">Username</label>
            {{ form.username }}
        </div>
        <div class="mb-3">
            <label class="form-label">Password</label>
            {{ form.password }}
        </div>
        <button type="submit" class="btn btn-primary w-100">Login as User</button>
    </form>
    <p class="auth-footer">
        <a href="{% url 'register' %}">Register</a> &middot;
        <a href="{% url 'authority_login' %}">Authority Login</a> &middot;
        <a href="{% url 'home' %}">Home</a>
    </p>
</div>
{% endblock %}
