{% extends 'signer/base.html' %}

{% block title %}Login - Document Signer System{% endblock %}

{% block auth_content %}
<div class="auth-card">
    <div class="auth-header">
        <i class="bi bi-shield-lock-fill auth-icon"></i>
        <h2>Document Signer System</h2>
        <p class="text-muted">Enterprise-Grade Secure Digital Signature</p>
    </div>
    <form method="post" class="auth-form">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label">Username</label>
            {{ form.username }}
        </div>
        <div class="mb-3">
            <label class="form-label">Password</label>
            {{ form.password }}
        </div>
        <button type="submit" class="btn btn-primary w-100">Login</button>
    </form>
    <p class="auth-footer">Don't have an account? <a href="{% url 'register' %}">Register here</a></p>
</div>
{% endblock %}
